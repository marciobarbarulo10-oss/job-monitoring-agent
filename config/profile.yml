about: |
  Profissional de Supply Chain e Comércio Exterior com mais de 5 anos de experiência em
  importação, desembaraço aduaneiro e logística internacional. Histórico comprovado em
  operações com ANVISA, cold chain farmacêutica, SISCOMEX e gestão de fornecedores
  internacionais. Experiência com automação de processos via Python e Excel avançado,
  reduzindo tempo de ciclo e erros operacionais. Busco posição de Analista Pleno em
  empresa com operações de importação ativas, especialmente no setor farmacêutico ou
  de alta complexidade regulatória.

